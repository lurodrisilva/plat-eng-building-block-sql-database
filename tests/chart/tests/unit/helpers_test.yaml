suite: test plat-eng-sql-database-package.serviceAccountName helper
templates:
  - charts/plat-eng-sql-database-package/templates/serviceaccount.yaml

tests:
  - it: "serviceAccountName — create=true, name empty: uses myorg.fullname"
    set:
      plat-eng-sql-database-package.serviceAccount.create: true
      plat-eng-sql-database-package.serviceAccount.name: ""
    asserts:
      - isNotNull:
          path: metadata.name
      - matchRegex:
          path: metadata.name
          pattern: "plat-eng-sql-database-package"

  - it: "serviceAccountName — create=true, name set: uses custom name"
    set:
      plat-eng-sql-database-package.serviceAccount.create: true
      plat-eng-sql-database-package.serviceAccount.name: "my-custom-sa"
    asserts:
      - equal:
          path: metadata.name
          value: "my-custom-sa"

  - it: "serviceAccountName — create=false, name empty: falls back to 'default'"
    set:
      plat-eng-sql-database-package.serviceAccount.create: false
      plat-eng-sql-database-package.serviceAccount.name: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: "serviceAccountName — create=false, name set: uses custom name (but no SA created)"
    set:
      plat-eng-sql-database-package.serviceAccount.create: false
      plat-eng-sql-database-package.serviceAccount.name: "explicit-sa"
    asserts:
      - hasDocuments:
          count: 0
