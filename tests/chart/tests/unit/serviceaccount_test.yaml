suite: test serviceaccount.yaml template
templates:
  - charts/plat-eng-sql-database-package/templates/serviceaccount.yaml

tests:
  - it: "creates ServiceAccount when serviceAccount.create=true (default)"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - isNotNull:
          path: metadata.name
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: "does NOT render ServiceAccount when serviceAccount.create=false"
    set:
      plat-eng-sql-database-package.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: "renders annotations when set"
    set:
      plat-eng-sql-database-package.serviceAccount.annotations:
        iam.amazonaws.com/role: my-role
    asserts:
      - hasDocuments:
          count: 1
      - isNotNull:
          path: metadata.annotations
      - equal:
          path: metadata.annotations["iam.amazonaws.com/role"]
          value: "my-role"

  - it: "sets automountServiceAccountToken: false when automount=false"
    set:
      plat-eng-sql-database-package.serviceAccount.automount: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: automountServiceAccountToken
          value: false
