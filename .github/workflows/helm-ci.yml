name: Helm CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint, Test, Package & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.20.0"

      - name: Install helm-unittest plugin
        run: make plugin-install

      - name: Install yamllint
        run: pip install yamllint

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Lint YAML
        run: make yamllint

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Validate with kubeconform
        run: make kubeconform

      - name: Package chart
        run: |
          make package

      - name: Login to GHCR
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart
        run: |
          helm push plat-eng-sql-database-package-*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts
